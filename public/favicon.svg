<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#050505"/>
  <defs>
    <radialGradient id="obsidianGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00f2ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#obsidianGradient)"/>
  
  {/* Cyan glowing corners */}
  <circle cx="0" cy="0" r="20" fill="#00f2ff" opacity="0.15" filter="blur(15px)"/>
  <circle cx="64" cy="64" r="20" fill="#00f2ff" opacity="0.15" filter="blur(15px)"/>

  {/* Monogram Section */}
  <g transform="translate(32, 32)">
    {/* Glass Layer */}
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="0.5"/>
    
    {/* Monogram N + L */}
    <text x="-5" y="10" fill="white" font-family="Arial, sans-serif" font-weight="800" font-size="24" text-anchor="middle">N</text>
    <text x="7" y="10" fill="white" opacity="0.5" font-family="Arial, sans-serif" font-weight="800" font-size="24" text-anchor="middle" transform="scale(-1, 1) translate(-14, 0)">L</text>
    
    {/* Accent Line */}
    <rect x="-6" y="12" width="12" height="1.5" rx="0.75" fill="#00f2ff" filter="url(#neonGlow)"/>
  </g>
</svg>
